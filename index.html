<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="cat-rain"></div>
    <div class="page">
        <header class="banner">
            <div class="banner-content">
                <h1>Get a random recipe!</h1>
                <p>Click on the button to get a random recipe and cook it up!!</p>
            </div>
        </header>
        <main>
            <div class="card">
                <div class="recipe-info">
                    <h2 id="recipe-name">¿Ready to hackacook?</h2>
                    <p id="recipe-description">Click the button and we'll cook a recipe for you!</p>
                    <ul id="recipe-ingredients"></ul>
                    <p id="recipe-instructions"></p>
                </div>
            </div>
            <button id="getRecipeBtn">Get random recipe</button>
        </main>
        <footer>
            <p>Quick ideas for you to cook!</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
